# Netlify config — static HTML site, no build step.
# The repo root is published as-is: index.html (version hub) + /v1, /v2, ... folders.

[build]
  publish = "."

# Nice-to-have security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
